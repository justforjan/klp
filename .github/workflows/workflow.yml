name: CI

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Lint check (ruff)
        uses: astral-sh/ruff-action@v3

  test:
    container:
      image: ghcr.io/justforjan/klp_pipeline_tests:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.KLP_PIPELINE_TEST_CR_PAT }}
    runs-on: ubuntu-latest
    name: Test
    needs: lint-check
    steps:
      - name: Verify locale
        run: |
          locale
          python -c "import locale; print('py locale.getdefaultlocale()', locale.getdefaultlocale())"

      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --dev # --locked

      - name: Run tests
        run: uv run pytest tests

  build:
    name: Build and Push App Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Login to GitHub Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.KLP_PIPELINE_TEST_CR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/${{ github.actor }}/klp:latest




