<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kulturelle Landpartie{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md mb-6">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-gray-800">Kulturelle Landpartie</a>
                </div>

                <div class="hidden md:flex space-x-4">
                    <a href="/events" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100">Termine</a>
                    <a href="/locations" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100">Orte</a>
                    <a href="/favourites" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100">Favoriten</a>
                </div>

                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-gray-700 hover:text-gray-900 focus:outline-none">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="mobile-menu" class="hidden md:hidden pb-4">
                <a href="/events" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100">Termine</a>
                <a href="/locations" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100">Orte</a>
                <a href="/favourites" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100">Favoriten</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 pb-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });

        function addToCalendar(eventName, startDatetime, endDatetime, location, description, organizer) {
            const formatDate = (dateStr) => {
                const date = new Date(dateStr);
                return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            };

            const start = formatDate(startDatetime);
            const end = endDatetime ? formatDate(endDatetime) : formatDate(new Date(new Date(startDatetime).getTime() + 2 * 60 * 60 * 1000));

            const escapedName = encodeURIComponent(eventName);
            const escapedLocation = encodeURIComponent(location);
            const escapedDescription = encodeURIComponent(description || '');
            const escapedOrganizer = organizer ? encodeURIComponent(`Veranstalter: ${organizer}`) : '';

            const googleCalendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${escapedName}&dates=${start}/${end}&location=${escapedLocation}&details=${escapedDescription}${escapedOrganizer ? '%0A' + escapedOrganizer : ''}`;

            window.open(googleCalendarUrl, '_blank');
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
